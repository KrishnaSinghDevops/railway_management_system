<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body class="bg-secondary">
  <div class="container">
    <div class="row justify-content-center mt-4">
      <div class="col-md-5">
        <div class="card shadow border-0">
          <div class="card-body p-4">
            <img src="/media/logo_r.png" class="d-block mx-auto mb-3" width="100" />
            <h3 class="text-center mb-4">User Registration</h3>
            <form id="registerForm">
              {% csrf_token %}
              <input type="text" name="full_name" class="form-control mb-3" placeholder="Full Name" />
              <input type="text" name="username" class="form-control mb-3" placeholder="Username" />
              <input type="email" name="email" class="form-control mb-3" placeholder="Email" />
              <input type="text" name="mobile" class="form-control mb-3" placeholder="Mobile" />
              <input type="password" name="password" class="form-control mb-3" placeholder="Password" />
              <input type="date" name="dob" class="form-control mb-3" placeholder="Date of Birth" />
              <select name="role" class="form-control mb-3" required>
                <option value="">Select Role</option>
                <option value="Admin">Admin</option>
                <option value="L1">L1</option>
                <option value="L2">L2</option>
                <option value="L3">L3</option>
                <option value="L4">L4</option>
                <option value="L5">L5</option>


              </select>


            

              
              <button class="btn btn-dark w-100">Register</button>
            </form>
            
            <div class="text-center mt-3">
              <a href="/"> Login </a>
            </div>
          </div>
          
        </div>
      </div>
    </div>
  </div>

  <script>
    $("#registerForm").submit(function (e) {
      e.preventDefault();
      $.ajax({
        url: "/save/user",
        type: "POST",
        data: $(this).serialize(),
        success: function (response) {
          if (response.status == "success") {
            Swal.fire({
              icon: "success",
              title: response.message,
            }).then(() => {
              window.location.href = "/";
            });
          }
        },
      });
    });
  </script>
</body>

</html>
