<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <title>Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body class="bg-light">

  <div class="container-flude vh-100">
    <div class="row justify-content-center h-100">
      <!-- left side -->
      <div class="col-6 d-flex justify-content-center align-items-center bg-primary">
        <img src="/media/login1.png" class="img-flude w-100 h-100" style="object-fit: cover;">
      </div>
      <!-- right side -->
      <div class="col-6 d-flex flex-column justify-content-center align-items-center">
        <img src="/media/logo_r.png" width="180" class="mb-3">
            <h3 class=" mb-4">User Login</h3>

            <form id="loginForm" class="w-75">
              {% csrf_token %}

              <input type="text" name="username" class="form-control mb-3" placeholder="Username" />

              <input type="password" name="password" class="form-control mb-3" placeholder="Password" />
              <div class="d-flex justify-content-between align-item-center mb-3">
                <div class="form-check">
                  <input type="checkbox" class="form-check-input" id="rememberme">
                  <label class="form-check-label" for="rememberme">Remember Me</label>

                </div>
                
                <a href="#" class="float-end mb-3">Forgot Password?</a>
              </div>

              <button class="btn btn-dark w-100">Login</button>
            </form>

            <div class="text-center mt-3">
              <a href="/create/user"> Create Account </a>
            </div>
      </div>
    </div>
  </div>

  <script>
    $("#loginForm").submit(function (e) {
      e.preventDefault();

      $.ajax({
        url: "/accounts/login",

        type: "POST",

        data: $(this).serialize(),

        success: function (response) {
          if (response.status == "success") {
            window.location.href = response.redirect_url;
          } else {
            Swal.fire({
              icon: 'error',
              title: 'Invalid Credentials',
              text: 'Please check your username and password and try again.',
            })
          }
        },
      });
    });
  </script>
  <script>
    document.getElementById('togglePassword').addEventListener( 'click', function(){
      const password = document.getElementByid('password');
      const icon = document.getElementByid('i');

      if(password.type === 'password'){
        password.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');

      }
      else
      {
        password.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
      }
    })
  </script>
  
</body>

</html>
