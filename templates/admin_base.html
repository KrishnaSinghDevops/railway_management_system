<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <title>{% block title %}{% endblock %}</title>
  {% block head %}
  {% endblock %}

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    .sidebar {
      position: fixed;
      top: 0;
      left: -250px;
      width: 250px;
      height: 100vh;
      transition: left 0.3s;
      z-index: 1050;
    }

    .sidebar.open {
      left: 0;
    }

    #mainContent {
      transition: all 0.3s;
    }

    #mainContent.shift {
      margin-left: 250px !important;
    }

    .header-bg {
      background-color: #050e62;
    }

    .navbar-nav .nav-link {
      font-size: 12px;
      font-weight: 500;
      color: #ffffff !important;
      padding: 8px 15px;
      border-radius: 2px;
      transition: all 0.3s ease;
    }

    .menu-parent {
      position: relative;
    }

    .custom-dropdown {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      min-width: 220px;
      background: #fff;
      padding: 0;
      margin: 0;
      list-style: none;
      border-radius: 6px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, .15);
      z-index: 9999;
    }

    .menu-parent:hover .custom-dropdown {
      display: block;
    }

    .custom-dropdown li {
      position: relative;
    }

    .custom-dropdown li a {
      display: block;
      padding: 10px 15px;
      text-decoration: none;
      color: #333;
      font-size: 13px;
    }

    .custom-dropdown li a:hover {
      background: #f5f5f5;
    }

    .submenu {
      display: none;
      position: absolute;
      top: 0;
      left: 100%;
      min-width: 220px;
      background: white;
      list-style: none;
      padding: 0;
      margin: 0;
      border-radius: 6px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, .15);
    }

    .submenu-parent:hover .submenu {
      display: block;
    }
  </style>
</head>

<body class="d-flex flex-column min-vh-100">
  <!-- header part -->
  <nav class="navbar navbar-dark header-bg px-4">
    <!-- menu button -->
    <div class="d-flex justify-content-between align-items-center ">
      <a href="/" class="navbar-brand ms-2" style="color: rgb(255, 255, 255); font-size: 15px; font-weight: 500;">
        <i class="fas fa-train me-2 text-danger"></i> Admin Pannel
      </a>
      <ul class="navbar-nav flex-row ms-4">
        {% include 'admin/admin_menu.html' %}
      </ul>

    </div>

    <div class="dropdown">
      <a href="#" class="text-decoration-none dropdown-toggle text-white" data-bs-toggle="dropdown"
        aria-expandad="false" style="color: rgb(0, 0, 0); font-size: 14px; font-weight: 500;">
        <i class="fas fa-user bg-primary text-white rounded-circle p-2" style="font-size: 12px;"></i>
        {{ username }}
      </a>
      <ul class="dropdown-menu dropdown-menu-end mt-2">
        <!-- <li >
            <a class="dropdown-item" href="/profile/">
              <i class="fas fa-user me-2"></i> Profile

            </a>
          </li>
          <li >
            <a class="dropdown-item" href="/profile/">
              <i class="fas fa-user me-2"></i> Change Password

            </a>
          </li> -->
        <li>
          <a class="dropdown-item text-danger text-center small" href="/logout/">
            <i class="fas fa-sign-out-alt me-2" style="font-size: 12px;"></i>
            <span style="font-size:12px;">Logout</span>
          </a>
        </li>

      </ul>

    </div>
  </nav>
  <!-- end header -->

  <div class="container-fluid flex-grow-1">

    <div class="row">

      <hr class="shadow">

      <div class="col-12" id="mainContent">
        {% block content %} {% endblock %}</div>
    </div>
  </div>

  <!-- start footer -->
  <footer class="bg-dark text-white p-2 mt-auto" style="font-size: 12px;">
    <div class="d-flex justify-content-between align-items-center">
      <span>© All Rights Reserverd @Bharat Railway</span>
      <span>version 1.0.0</span>
    </div>
  </footer>
  <!-- end footer -->
  {% block script %}
  {% endblock %}
</body>

</html>
