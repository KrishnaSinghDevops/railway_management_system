<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>{% block title %}{% endblock %}</title>
    {% block head %}
    {% endblock %}

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
      .sidebar {
        position: fixed;
        top: 0;
        left: -250px;
        width: 250px;
        height: 100vh;
        transition: left 0.3s;
        z-index: 1050;
      }
      .sidebar.open {
        left: 0;
      }
     #mainContent {
    transition: all 0.3s;
}

#mainContent.shift {
    margin-left: 250px !important;
}
      </style>
  </head>

  <body class="d-flex flex-column min-vh-100">
    <!-- header part -->
    <nav class="navbar navbar-dark bg-light px-4">
      <!-- menu button -->
      <div class="d-flex justify-content-between align-items-center">
        <button id="openSidebar" class="btn btn-primary">&#9776;</button>
        <a class="navbar-brand ms-2" style="color: black;">
          <i class="fas fa-train me-2 text-dark"></i>  Bharat Railway
        </a>

      </div>
      
      <div class="dropdown">
        <a href="#" class="text-decoration-none dropdown-toggle text-dark" data-bs-toggle="dropdown" aria-expandad="false">
          
          
          
          <i class="fas fa-user bg-primary text-white rounded-circle p-2" style="font-size: 12px;"></i>
          {{ username }}
        </a>
        <ul class="dropdown-menu dropdown-menu-end mt-2">
          <!-- <li >
            <a class="dropdown-item" href="/profile/">
              <i class="fas fa-user me-2"></i> Profile

            </a>
          </li>
          <li >
            <a class="dropdown-item" href="/profile/">
              <i class="fas fa-user me-2"></i> Change Password

            </a>
          </li> -->
          <li>
            <a class="dropdown-item text-danger text-center small" href="/logout/">
                <i class="fas fa-sign-out-alt me-2" style="font-size: 12px;"></i> 
                <span style="font-size:12px;">Logout</span>
            </a>
          </li>

        </ul>

      </div>
    </nav>
    <!-- end header -->

    <div class="container-fluid flex-grow-1">
      
      <div class="row">
        <!-- sidebar start -->
        

        <!-- Sidebar -->
        <div id="sidebar" class="sidebar bg-dark vh-100 p-3">
          <button id="closeSidebar" class="btn btn-light mb-3">&times;</button>
          <ul class="nav flex-column">
            <li class="nav-item mb-2">
              <a href="/dashboard/" class="nav-link">Home</a>
            </li>
            <li class="nav-item mb-2">
              <a href="/search/train/" class="nav-link">Search Train</a>
            </li>
            <li class="nav-item mb-2">
              <a href="/my/bookings/" class="nav-link">My Bookings</a>
            </li>
            
          </ul>
        </div>
        <!-- end sidebar -->
        <hr class="shadow">

        <div class="col-12 p-4" id="mainContent">
          {% block content %} {% endblock %}</div>
      </div>
    </div>

    <!-- start footer -->
    <footer class="bg-dark text-white p-2 mt-auto" style="font-size: 12px;">
      <div class="d-flex justify-content-between align-items-center">
        <span>© All Rights Reserverd @Bharat Railway</span>
        <span>version 1.0.0</span>
      </div>
    </footer>
    <!-- end footer -->
    {% block script %}
    {% endblock %}
  </body>
  <script>
    document.getElementById('openSidebar').onclick = function() {
    document.getElementById('sidebar').classList.add('open');
    document.getElementById('mainContent').classList.add('shift');
  };

  document.getElementById('closeSidebar').onclick = function() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('mainContent').classList.remove('shift');
  };
    </script>
</html>
